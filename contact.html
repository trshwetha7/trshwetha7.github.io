<!DOCTYPE html>

  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Libre+Baskerville:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html">MyPortfolio</a>
        <nav class="site-nav" aria-label="Primary">
          <a data-nav-link href="index.html">About</a>
          <a data-nav-link href="work-experience.html">Work Experience</a>
          <a data-nav-link href="research.html">Research</a>
          <a data-nav-link href="mentoring.html">Mentoring</a>
          <a data-nav-link href="projects.html">Projects</a>
          <a data-nav-link href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="page">
      <section class="hero compact reveal">
        <div>
          <h1>Get In Touch</h1>
          <p>
            Have a question or want to collaborate? Drop a message. I promise I am quicker than your
            model&rsquo;s training run :D
          </p>
        </div>
      </section>

      <section class="contact-layout reveal">
        <aside class="contact-panel">
          <div class="contact-list">
            <span>Email</span>
            <a href="mailto:stinnium@alumni.cmu.edu">stinnium@alumni.cmu.edu</a>
            <span>Phone</span>
            <a href="tel:+14129831154">+1(412)9831154</a>
          </div>

          <p class="eyebrow">Connect</p>
          <div class="icon-row">
            <a class="icon-link" href="https://github.com/trshwetha7" target="_blank" rel="noreferrer" aria-label="GitHub">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.11 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.91.08 2.11.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
              </svg>
            </a>
            <a class="icon-link" href="https://www.linkedin.com/in/shwetha-tinnium-raju/" target="_blank" rel="noreferrer" aria-label="LinkedIn">in</a>
            <a class="icon-link" href="mailto:stinnium@alumni.cmu.edu" aria-label="Email">@</a>
          </div>
        </aside>

        <section class="contact-panel">
          <form
            id="contactForm"
            class="contact-form"
            action="https://formsubmit.co/stinnium@alumni.cmu.edu"
            method="POST"
          >
            <input type="hidden" name="_subject" value="Portfolio Contact Message" />
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_template" value="table" />
            <div class="form-grid">
              <div class="field">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Your name" required />
              </div>
              <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="your.email@example.com" required />
              </div>
            </div>
            <div class="field">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Your message here..." required></textarea>
            </div>
            <button class="btn" type="submit">Send Message</button>
          </form>
        </section>
      </section>
    </main>

    <script src="assets/main.js"></script>
  </body>
</html>
